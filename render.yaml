services:
  - type: web
    name: eld-trip-planner-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.vercel\\.app$"
      - key: GEOCODER_PROVIDER
        value: "photon"
      - key: GEOCODER_USER_AGENT
        value: "eld-trip-planner/1.0 (deployment)"